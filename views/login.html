<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول | جامعة الملك عبدالعزيز</title>
  <link rel="stylesheet" href="/public/style.css" />
</head>

<body class="login-page">
  <div class="login-wrapper">
    <div class="login-shell">
      <img src="/public/kau-logo.png" alt="جامعة الملك عبدالعزيز" class="kau-logo" />

      <div class="login-card login-card-rtl">
        <h1 class="login-title">Login</h1>

        <div id="errorBox" class="alert error hidden">
          username or password is incorrect. </div>

        <form action="/login" method="POST" class="login-form">
          <div class="form-group english-field-group">
            <label for="username">Username</label>
            <div class="input-wrap icon-left">
              <span class="input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z" />
                </svg>
              </span>
              <input id="username" name="username" type="text" placeholder="2000000" required />
            </div>
          </div>

          <div class="form-group english-field-group">
            <label for="password">Password</label>
            <div class="input-wrap with-action icon-left">
              <span class="input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path
                    d="M17 8h-1V6a4 4 0 1 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-6-2a2 2 0 1 1 4 0v2h-4Z" />
                </svg>
              </span>
              <input id="password" name="password" type="password" placeholder="••••••••••" required />
              <button type="button" class="toggle-password" id="togglePassword" aria-label="إظهار أو إخفاء كلمة المرور">
                <svg id="eyeOpen" viewBox="0 0 24 24" fill="currentColor">
                  <path
                    d="M12 5c5.23 0 9.27 3.11 11 7-1.73 3.89-5.77 7-11 7S2.73 15.89 1 12c1.73-3.89 5.77-7 11-7Zm0 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z" />
                </svg>
                <svg id="eyeClosed" viewBox="0 0 24 24" fill="currentColor" class="hidden">
                  <path
                    d="m2.1 3.51 1.41-1.41L21.9 20.49l-1.41 1.41-3.13-3.13A11.87 11.87 0 0 1 12 20C6.77 20 2.73 16.89 1 13a12.7 12.7 0 0 1 4.21-5.11ZM7.53 9.36A3.94 3.94 0 0 0 8 11a4 4 0 0 0 5 5 3.94 3.94 0 0 0 1.64-.47ZM12 4c5.23 0 9.27 3.11 11 7a12.48 12.48 0 0 1-3.23 4.36l-2.08-2.08A8.78 8.78 0 0 0 20.82 11 10.9 10.9 0 0 0 12 6a10.44 10.44 0 0 0-3.77.7L6.57 5.04A12.18 12.18 0 0 1 12 4Zm-.41 3.02a4 4 0 0 1 5.39 5.39Z" />
                </svg>
              </button>
            </div>
          </div>

          <label class="remember-row">
            <input type="checkbox" name="remember" />
            <span>Remember me</span>
          </label>

          <button type="submit" class="btn-primary login-submit-btn">Login</button>
        </form>
      </div>

      <div class="login-footer">
        <p>© 2026 King Abdulaziz University</p>
        <p>King Abdulaziz University</p>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get("error") === "1") {
      document.getElementById("errorBox").classList.remove("hidden");
    }

    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");
    const eyeOpen = document.getElementById("eyeOpen");
    const eyeClosed = document.getElementById("eyeClosed");

    togglePassword.addEventListener("click", () => {
      const isPassword = passwordInput.type === "password";
      passwordInput.type = isPassword ? "text" : "password";
      eyeOpen.classList.toggle("hidden", isPassword);
      eyeClosed.classList.toggle("hidden", !isPassword);
    });
  </script>
</body>

</html>
